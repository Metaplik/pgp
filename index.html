<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>P2P CALL</title>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

<style>
body {
    margin:0;
    background:black;
    color:#0f0;
    font-family: monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    padding:10px;
    box-sizing:border-box;
}

/* MATRIX */
canvas {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:0;
}

/* BOX */
.box {
    position:relative;
    z-index:1;
    width:100%;
    max-width:300px;
    background:rgba(0,0,0,0.95);
    border:2px solid #0f0;
    border-radius:12px;
    padding:12px;
    text-align:center;
    box-sizing:border-box;
}

h2 {
    margin:0 0 8px;
    font-size:18px;
}

/* INPUTS + BUTTONS */
input, button {
    width:100%;
    height:40px;
    margin:4px 0;
    padding:0 8px;
    background:#111;
    border:1.5px solid #0f0;
    color:#0f0;
    font-size:14px;
    text-align:center;
    border-radius:6px;
    box-sizing:border-box;
}

/* STATUS */
#status {
    margin-top:6px;
    font-size:11px;
    padding:3px;
}

/* TALK BUTTON */
#talk {
    width:80px;
    height:80px;
    margin:10px auto;
    border-radius:50%;
    border:none;
    cursor:pointer;
    background:radial-gradient(circle at 30% 30%, #ff4d4d, #cc0000);
    box-shadow: 0 0 20px rgba(255,0,0,0.6), inset 0 0 15px rgba(255,255,255,0.2);
}

#talk:active {
    transform:scale(0.95);
}

/* SMS */
.sms-area {
    margin-top:10px;
    border-top:1px solid #0f0;
    padding-top:8px;
}

.sms-box {
    background:#000;
    border:1px solid #0f0;
    border-radius:6px;
    height:100px;
    overflow-y:auto;
    padding:5px;
    margin-bottom:6px;
    text-align:left;
    font-size:11px;
}

.sms-input {
    display:flex;
    gap:5px;
}

.sms-input input {
    flex:1;
    height:35px;
    font-size:12px;
    margin:0;
    padding:0 5px;
}

.sms-input button {
    width:55px;
    height:35px;
    margin:0;
    font-size:11px;
    padding:0;
}

.msg {
    margin-bottom:4px;
    word-wrap:break-word;
}

.msg span {
    color:#ff0;
}

.msg.me {
    color:#0f0;
}

/* Scrollbar fine */
.sms-box::-webkit-scrollbar {
    width:3px;
}

.sms-box::-webkit-scrollbar-track {
    background:#111;
}

.sms-box::-webkit-scrollbar-thumb {
    background:#0f0;
}

/* Ajustement petits écrans */
@media (max-width: 400px) {
    .box {
        padding:10px;
    }
    
    input, button {
        height:38px;
        font-size:13px;
    }
    
    #talk {
        width:70px;
        height:70px;
    }
    
    .sms-box {
        height:90px;
    }
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="box">

<h2>P2P CALL</h2>

<input id="room" placeholder="Code / clé">
<button onclick="create()">CRÉER</button>

<input id="myId" readonly placeholder="Ton ID">

<input id="friend" placeholder="ID de l'ami">
<button onclick="connect()">CONNECTER</button>

<div id="status">En attente...</div>

<div class="sms-area">
    <div class="sms-box" id="smsBox"></div>
    <div class="sms-input">
        <input type="text" id="smsInput" placeholder="Message">
        <button onclick="sendSMS()">ENVOYER</button>
    </div>
</div>

<button id="talk"></button>

</div>

<script>
// MATRIX
const c = document.getElementById("matrix");
const ctx = c.getContext("2d");
c.width = window.innerWidth;
c.height = window.innerHeight;

let letters = "01P2P".split("");
let font = 12;
let cols = Math.floor(c.width / font);
let drops = [];

for(let i = 0; i < cols; i++) drops[i] = 1;

function draw(){
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0, 0, c.width, c.height);

    ctx.fillStyle = "#0f0";
    ctx.font = font + "px monospace";

    for(let i = 0; i < drops.length; i++){
        let text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * font, drops[i] * font);

        if(drops[i] * font > c.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    }
}

setInterval(draw, 33);

window.addEventListener('resize', () => {
    c.width = window.innerWidth;
    c.height = window.innerHeight;
    cols = Math.floor(c.width / font);
    drops = [];
    for(let i = 0; i < cols; i++) drops[i] = 1;
});

// PEER
let peer;
let connections = [];
let stream;
let recorder;
let chunks = [];

function create(){
    const room = document.getElementById("room").value.trim();
    if(!room) return alert("entre un code");

    const id = room + "_" + Math.floor(Math.random()*10000);
    peer = new Peer(id);

    peer.on("open", id=>{
        document.getElementById("myId").value = id;
        document.getElementById("status").innerText = "ID prêt";
    });

    peer.on("connection", conn=>{
        setup(conn);
    });
}

function connect(){
    const id = document.getElementById("friend").value.trim();
    if(!id) return;

    const conn = peer.connect(id);
    setup(conn);
}

function setup(conn){
    conn.on("open", ()=>{
        connections.push(conn);
        document.getElementById("status").innerText = "connecté ("+connections.length+")";
    });

    conn.on("data", data=>{
        if(data && data.type === "sms"){
            addSMS("Ami", data.msg);
        } else {
            const blob = new Blob([data], {type:"audio/webm"});
            new Audio(URL.createObjectURL(blob)).play();
        }
    });
}

function sendSMS(){
    const input = document.getElementById("smsInput");
    const msg = input.value.trim();
    if(!msg) return;
    if(connections.length === 0){
        addSMS("Système", "Pas connecté");
        return;
    }
    
    addSMS("Moi", msg);
    
    connections.forEach(c=>{
        if(c.open) c.send({type:"sms", msg:msg});
    });
    
    input.value = "";
}

function addSMS(sender, msg){
    const box = document.getElementById("smsBox");
    const div = document.createElement("div");
    div.className = "msg";
    if(sender === "Moi") div.classList.add("me");
    div.innerHTML = `<span>${sender}:</span> ${msg}`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

const talk = document.getElementById("talk");

talk.onmousedown = start;
talk.onmouseup = stop;
talk.ontouchstart = e=>{e.preventDefault();start()};
talk.ontouchend = e=>{e.preventDefault();stop()};

async function start(){
    if(connections.length==0){
        document.getElementById("status").innerText="connecte toi";
        return;
    }

    if(!stream){
        stream = await navigator.mediaDevices.getUserMedia({audio:true});
    }

    chunks=[];
    recorder = new MediaRecorder(stream);

    recorder.ondataavailable = e=>chunks.push(e.data);
    recorder.start(100);
}

function stop(){
    if(!recorder) return;

    recorder.stop();

    recorder.onstop = ()=>{
        const blob = new Blob(chunks,{type:"audio/webm"});
        connections.forEach(c=>{
            if(c.open) c.send(blob);
        });
    }
}

document.getElementById("smsInput").addEventListener("keypress", function(e){
    if(e.key === "Enter") sendSMS();
});
</script>

</body>
</html>
