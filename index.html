<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P2P CHAT PRO</title>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:#000;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:#0f0;
}

/* CONTAINER */
.app{
    width:100%;
    max-width:360px;
    height:95vh;
    background:#0b0b0b;
    border-radius:16px;
    display:flex;
    flex-direction:column;
    border:2px solid #0f0;
    overflow:hidden;
}

/* HEADER */
.header{
    padding:10px;
    text-align:center;
    border-bottom:1px solid #0f0;
    font-weight:bold;
}

/* SECTION */
.section{
    padding:10px;
    display:flex;
    flex-direction:column;
    gap:6px;
}

/* INPUT + BUTTON */
input,button{
    height:40px;
    border-radius:8px;
    border:1px solid #0f0;
    background:#000;
    color:#0f0;
    text-align:center;
}

button{
    cursor:pointer;
}

/* STATUS */
#status{
    text-align:center;
    font-size:12px;
}

/* CHAT */
#chat{
    flex:1;
    padding:10px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:6px;
}

/* MESSAGES */
.msg{
    max-width:75%;
    padding:8px;
    border-radius:10px;
    font-size:13px;
    word-break:break-word;
}

.me{
    align-self:flex-end;
    background:#0f0;
    color:#000;
}

.other{
    align-self:flex-start;
    background:#222;
}

/* INPUT BAR */
.bottom{
    padding:10px;
    border-top:1px solid #0f0;
    display:flex;
    gap:5px;
}

#msg{
    flex:1;
}

/* TALK BUTTON */
#talk{
    width:55px;
    background:red;
    border:none;
    border-radius:8px;
    color:#fff;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="app">

<div class="header">P2P CHAT</div>

<div class="section">
    <input id="room" placeholder="Code">
    <button onclick="create()">Créer ID</button>

    <input id="myId" readonly placeholder="Ton ID">

    <input id="friend" placeholder="ID ami">
    <button onclick="connect()">Connecter</button>

    <div id="status">offline</div>
</div>

<div id="chat"></div>

<div class="bottom">
    <input id="msg" placeholder="message...">
    <button onclick="sendMsg()">OK</button>
    <button id="talk">🎤</button>
</div>

</div>

<script>

// PEER
let peer, connections=[], stream, recorder, chunks=[];

// CREATE
function create(){
    const room=document.getElementById("room").value.trim();
    if(!room) return;

    const id=room+"_"+Math.floor(Math.random()*10000);
    peer=new Peer(id);

    peer.on("open",id=>{
        document.getElementById("myId").value=id;
        document.getElementById("status").innerText="ID prêt";
    });

    peer.on("connection",c=>setup(c));
}

// CONNECT
function connect(){
    const id=document.getElementById("friend").value.trim();
    if(!id) return;

    const conn=peer.connect(id);
    setup(conn);
}

// SETUP
function setup(conn){
    conn.on("open",()=>{
        connections.push(conn);
        document.getElementById("status").innerText="connecté";
    });

    conn.on("data",data=>{
        if(data.type==="msg"){
            addMsg(data.text,false);
        }

        if(data.type==="audio"){
            new Audio(URL.createObjectURL(data.blob)).play();
        }
    });
}

// CHAT
function sendMsg(){
    const input=document.getElementById("msg");
    const text=input.value.trim();
    if(!text) return;

    connections.forEach(c=>{
        if(c.open){
            c.send({type:"msg",text});
        }
    });

    addMsg(text,true);
    input.value="";
}

function addMsg(text,isMe){
    const chat=document.getElementById("chat");

    const div=document.createElement("div");
    div.className="msg "+(isMe?"me":"other");
    div.innerText=text;

    chat.appendChild(div);
    chat.scrollTop=chat.scrollHeight;
}

// AUDIO
const talk=document.getElementById("talk");

talk.onpointerdown=start;
talk.onpointerup=stop;

async function start(){
    if(connections.length==0) return;

    if(!stream){
        stream=await navigator.mediaDevices.getUserMedia({audio:true});
    }

    chunks=[];
    recorder=new MediaRecorder(stream);
    recorder.ondataavailable=e=>chunks.push(e.data);
    recorder.start();
}

function stop(){
    if(!recorder) return;

    recorder.stop();

    recorder.onstop=()=>{
        const blob=new Blob(chunks,{type:"audio/webm"});
        connections.forEach(c=>{
            if(c.open){
                c.send({type:"audio",blob});
            }
        });
    }
}
</script>

</body>
</html>
